services:
  backend:
    build: ./backend
    container_name: controle-patrimonio-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Frontend roda separado via `npm run dev` em dev, ou como build estático
  # servido por qualquer CDN / nginx em produção. Mantemos fora do compose
  # para deixar o template mais simples e portável — habilite abaixo se
  # quiser um preview full-stack com um único comando.
  #
  # frontend:
  #   build: ./frontend
  #   container_name: controle-patrimonio-frontend
  #   ports:
  #     - "5173:80"
  #   depends_on:
  #     backend:
  #       condition: service_healthy
  #   environment:
  #     - VITE_API_BASE_URL=http://localhost:8000
  #   restart: unless-stopped
