server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml text/xml image/svg+xml;
  gzip_min_length 1024;

  # Long cache for static assets
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # PWA files
  location ~* \.(?:manifest|webmanifest|js|css|png|svg|ico|woff2)$ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # Service worker: never cache, must be served from root scope
  location = /sw.js {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }
  location = /registerSW.js {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }
  location = /manifest.webmanifest {
    add_header Cache-Control "public, max-age=3600";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
